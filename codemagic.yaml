workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Auto-fix ALL dependencies (Paths & Conflicts)
        script: |
          rm -f pubspec.lock
          
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          
          while true; do
            OUTPUT=$(flutter pub get 2>&1)
            
            if [ $? -eq 0 ]; then
              echo "✅ Toutes les dépendances sont téléchargées avec succès !"
              break
            fi
            
            MISSING_PKG=$(echo "$OUTPUT" | grep -o 'could not find package [^ ]*' | head -n 1 | awk '{print $5}')
            if [ ! -z "$MISSING_PKG" ]; then
              echo "🔧 Paquet local manquant détecté : $MISSING_PKG -> Correction automatique..."
              echo "  $MISSING_PKG: any" >> pubspec.yaml
              continue
            fi
            
            CONFLICT_PKG=$(echo "$OUTPUT" | grep -oE 'depends on [a-z0-9_]+ [\^\>\=\<]+[0-9]+' | head -n 1 | awk '{print $3}')
            if [ ! -z "$CONFLICT_PKG" ]; then
              if grep -q "  $CONFLICT_PKG: any" pubspec.yaml; then
                echo "❌ Impossible de résoudre automatiquement le conflit sur $CONFLICT_PKG."
                echo "$OUTPUT"
                exit 1
              fi
              echo "⚡ Conflit de version détecté sur : $CONFLICT_PKG -> Forçage automatique (any)..."
              echo "  $CONFLICT_PKG: any" >> pubspec.yaml
              continue
            fi
            
            echo "❌ Erreur inconnue détectée :"
            echo "$OUTPUT"
            exit 1
          done

      - name: Fix Android AGP 9+ Compatibility
        script: |
          echo "🔧 Injection des paramètres de compatibilité rétrograde pour Android AGP 9..."
          
          # On vérifie que le fichier properties existe et on ajoute les flags de rétrocompatibilité
          if [ -f "android/gradle.properties" ]; then
            # Désactive la nouvelle interface DSL d'Android qui casse les vieux plugins
            echo "android.newDsl=false" >> android/gradle.properties
            # Réactive l'ancien plugin kotlin-android pour les vieux paquets comme move_to_background
            echo "android.builtInKotlin=false" >> android/gradle.properties
            echo "✅ Patch Android appliqué !"
          else
            echo "⚠️ Fichier android/gradle.properties introuvable."
          fi

      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
