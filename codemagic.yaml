workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 60
    environment:
      flutter: 3.19.6
    scripts:
      - name: Auto-fix ALL dependencies (Paths & Conflicts)
        script: |
          echo "🔧 Abaissement de la contrainte Dart SDK pour compatibilité..."
          sed -i.bak 's/>=3.8.0/>=3.0.0/g' pubspec.yaml
          
          rm -f pubspec.lock
          
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          
          while true; do
            OUTPUT=$(flutter pub get 2>&1)
            
            if [ $? -eq 0 ]; then
              echo "✅ Toutes les dépendances sont téléchargées avec succès !"
              break
            fi
            
            MISSING_PKG=$(echo "$OUTPUT" | grep -o 'could not find package [^ ]*' | head -n 1 | awk '{print $5}')
            if [ ! -z "$MISSING_PKG" ]; then
              echo "🔧 Paquet local manquant détecté : $MISSING_PKG -> Correction automatique..."
              echo "  $MISSING_PKG: any" >> pubspec.yaml
              continue
            fi
            
            CONFLICT_PKG=$(echo "$OUTPUT" | grep -oE 'depends on [a-z0-9_]+ [\^\>\=\<]+[0-9]+' | head -n 1 | awk '{print $3}')
            if [ ! -z "$CONFLICT_PKG" ]; then
              if grep -q "  $CONFLICT_PKG: any" pubspec.yaml; then
                echo "❌ Impossible de résoudre automatiquement le conflit sur $CONFLICT_PKG."
                echo "$OUTPUT"
                exit 1
              fi
              echo "⚡ Conflit de version détecté sur : $CONFLICT_PKG -> Forçage automatique (any)..."
              echo "  $CONFLICT_PKG: any" >> pubspec.yaml
              continue
            fi
            
            echo "❌ Erreur inconnue détectée :"
            echo "$OUTPUT"
            exit 1
          done

      - name: Downgrade Gradle & AGP for Flutter 3.19
        script: |
          echo "🔧 Configuration de Gradle 8.3 et AGP 8.1.0..."
          
          # 1. Rétrograder le Gradle Wrapper
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i.bak -e 's/gradle-[0-9\.]*-all\.zip/gradle-8.3-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          fi
          
          # 2. Rétrograder l'Android Gradle Plugin (AGP) dans settings.gradle (s'il existe sous ce format)
          if [ -f android/settings.gradle ]; then
            sed -i.bak -E 's/id "com.android.application" version "[0-9\.]+"/id "com.android.application" version "8.1.0"/g' android/settings.gradle
          fi
          
          # 3. Rétrograder l'AGP dans build.gradle (format classique)
          if [ -f android/build.gradle ]; then
            sed -i.bak -E 's/com\.android\.tools\.build\:gradle\:[0-9\.]+/com.android.tools.build:gradle:8.1.0/g' android/build.gradle
          fi

      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
