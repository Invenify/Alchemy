workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 60
    environment:
      flutter: 3.19.6
    scripts:
      - name: Auto-fix ALL dependencies (Paths & Conflicts)
        script: |
          echo "🔧 Abaissement de la contrainte Dart SDK pour compatibilité..."
          sed -i.bak 's/>=3.8.0/>=3.0.0/g' pubspec.yaml
          
          rm -f pubspec.lock
          
          # Initialiser la section dependency_overrides s'il y a des conflits de versions
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          
          # Boucle de résolution automatique des dépendances manquantes ou cassées
          while true; do
            OUTPUT=$(flutter pub get 2>&1)
            
            if [ $? -eq 0 ]; then
              echo "✅ Toutes les dépendances sont téléchargées avec succès !"
              break
            fi
            
            # Détecter si une dépendance locale (comme scrobblenaut) est manquante
            MISSING_PKG=$(echo "$OUTPUT" | grep -o "could not find package [^ ]*" | head -n 1 | awk '{print $5}' | tr -d '"'\''')
            
            if [ -n "$MISSING_PKG" ]; then
              echo "🔧 Résolution du package manquant ou mal configuré : $MISSING_PKG"
              
              # Si le package manquant est scrobblenaut (qui pose problème en local)
              if [ "$MISSING_PKG" = "scrobblenaut" ]; then
                # On crée un dossier scrobblenaut factice ou vide avec un pubspec minimal 
                # pour que Flutter arrête de bloquer la compilation si le dossier local est absent
                mkdir -p scrobblenaut/lib
                echo "name: scrobblenaut" > scrobblenaut/pubspec.yaml
                echo "version: 1.0.0" >> scrobblenaut/pubspec.yaml
                echo "environment:" >> scrobblenaut/pubspec.yaml
                echo "  sdk: '>=3.0.0 <4.0.0'" >> scrobblenaut/pubspec.yaml
                echo "library scrobblenaut;" > scrobblenaut/lib/scrobblenaut.dart
                echo "✅ Dossier local temporaire créé pour scrobblenaut."
              else
                # Pour d'autres packages classiques en conflit, on force une version compatible
                echo "  $MISSING_PKG: any" >> pubspec.yaml
              fi
            else
              echo "❌ Erreur de dépendance non résoluble automatiquement :"
              echo "$OUTPUT"
              exit 1
            fi
          done

      - name: Downgrade Gradle & AGP for Flutter 3.19
        script: |
          echo "🔧 Configuration de Gradle 8.3 et AGP 8.1.0..."
          
          # 1. Rétrograder le Gradle Wrapper avec l'URL officielle complète de Gradle 8.3
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i.bak -E 's|^distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
            echo "✅ Gradle Wrapper configuré sur Gradle 8.3"
          fi
          
          # 2. Rétrograder l'Android Gradle Plugin (AGP) dans settings.gradle (si format récent)
          if [ -f android/settings.gradle ]; then
            sed -i.bak -E 's/id "com.android.application" version "[0-9\.]+"/id "com.android.application" version "8.1.0"/g' android/settings.gradle
            echo "✅ AGP configuré sur 8.1.0 dans settings.gradle"
          fi
          
          # 3. Rétrograder l'AGP dans build.gradle (si format classique)
          if [ -f android/build.gradle ]; then
            sed -i.bak -E 's/com\.android\.tools\.build\:gradle\:[0-9\.]+/com.android.tools.build:gradle:8.1.0/g' android/build.gradle
            echo "✅ AGP configuré sur 8.1.0 dans build.gradle"
          fi

      - name: Build debug APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
