workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Force dependencies from Internet
        script: |
          # 1. On supprime le fichier de cache
          rm -f pubspec.lock
          
          # 2. On ajoute les surcharges pour TOUS les modules locaux manquants
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  figma_squircle: any" >> pubspec.yaml
          echo "  liquid_progress_indicator_v2: any" >> pubspec.yaml
          echo "  scrobblenaut: any" >> pubspec.yaml
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
