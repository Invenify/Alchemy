workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Force fix pubspec.yaml
        script: |
          # Crée un fichier sans les lignes locales, puis remplace l'original (compatible Mac/Linux)
          sed '/path: figma_squircle/d' pubspec.yaml > tmp.yaml && mv tmp.yaml pubspec.yaml
          sed '/path: liquid_progress_indicator_v2/d' pubspec.yaml > tmp.yaml && mv tmp.yaml pubspec.yaml
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
