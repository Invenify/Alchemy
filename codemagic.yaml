workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Auto-fix ALL local dependencies
        script: |
          # On repart à zéro avec le cache
          rm -f pubspec.lock
          
          # On prépare la section des surcharges
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          
          # 🚨 NOUVEAU : On force Flutter à ignorer le conflit de version pour json_annotation
          echo "  json_annotation: any" >> pubspec.yaml
          
          # Boucle automatique qui répare les paquets manquants
          while true; do
            OUTPUT=$(flutter pub get 2>&1)
            
            if [ $? -eq 0 ]; then
              echo "✅ Toutes les dépendances sont téléchargées avec succès !"
              break
            fi
            
            PKG=$(echo "$OUTPUT" | grep -o 'could not find package [^ ]*' | head -n 1 | awk '{print $5}')
            
            if [ -z "$PKG" ]; then
              echo "❌ Erreur différente détectée :"
              echo "$OUTPUT"
              exit 1
            fi
            
            echo "🔧 Paquet local détecté : $PKG -> Correction automatique..."
            echo "  $PKG: any" >> pubspec.yaml
          done

      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
